<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Android MCQ Quiz</title>

<style>



/* ===== GLOBAL ===== */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

/* ===== QUIZ CARD ===== */
.quiz-container {
    background: white;
    width: 100%;
    max-width: 800px;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    overflow: hidden;
}

/* ===== HEADER ===== */
.quiz-header {
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 15px;
}

/* ===== PROGRESS BAR ===== */
.progress {
    height: 8px;
    background: #eee;
    border-radius: 6px;
    margin-bottom: 20px;
}

.progress-bar {
    height: 8px;
    background: #667eea;
    width: 0%;
    border-radius: 6px;
    transition: 0.3s ease;
}

/* ===== QUESTION ===== */
#question {
    font-size: 18px;
    margin-bottom: 18px;
    line-height: 1.5;
}

/* ===== OPTIONS ===== */
.option {
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 15px;
}

.option:hover {
    background: #f5f6ff;
}

.correct {
    background: #d4edda !important;
    border-color: green !important;
}

.wrong {
    background: #f8d7da !important;
    border-color: red !important;
}

/* ===== EXPLANATION BOX ===== */
#result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: #f8f9fa;
    font-size: 14px;
}

/* ===== BUTTONS ===== */
.buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    background: #667eea;
    color: white;
    font-size: 14px;
    transition: 0.2s ease;
}

button:hover {
    opacity: 0.9;
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 600px) {

    .quiz-container {
        padding: 18px;
        border-radius: 12px;
    }

    #question {
        font-size: 16px;
    }

    .option {
        font-size: 14px;
        padding: 12px;
    }

    button {
        font-size: 13px;
        padding: 10px;
    }

    .buttons {
        flex-direction: column;
    }

    button {
        width: 100%;
    }

}

</style>
</head>

<body>

<div class="quiz-container">

<div class="quiz-header" id="qNumber"></div>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div id="question"></div>
<div id="options"></div>

<div id="result"></div>

<div class="buttons">
    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
</div>

</div>

<script>

question: "Which of the following is NOT a basic view in Android?",

question: "Which method is used to initialize an activity in Android?",

question: "The life cycle of a fragment: Which method is called when a fragment is being created?",
options: [

/* ===== VARIABLES ===== */
let currentQuestion = 0;
let answered = false;

/* ===== LOAD QUESTION ===== */
function loadQuestion() {

    answered = false;

    const q = quizData[currentQuestion];

    document.getElementById("qNumber").innerText =
        `Question ${currentQuestion + 1} of ${quizData.length}`;

    document.getElementById("question").innerText = q.question;

    document.getElementById("result").innerHTML = "";

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = option;

        div.onclick = () => checkAnswer(index);

        optionsDiv.appendChild(div);
    });

    document.getElementById("progressBar").style.width =
        ((currentQuestion + 1) / quizData.length) * 100 + "%";
}

/* ===== CHECK ANSWER ===== */
function checkAnswer(selectedIndex) {

    if (answered) return;
    answered = true;

    const correctIndex = quizData[currentQuestion].correctIndex;
    const options = document.querySelectorAll(".option");

    options.forEach((opt, index) => {

        opt.onclick = null; // disable clicking

        if (index === correctIndex) {
            opt.classList.add("correct");
        }

        if (index === selectedIndex && selectedIndex !== correctIndex) {
            opt.classList.add("wrong");
        }
    });

    const explanationBox = document.getElementById("result");

    if (selectedIndex === correctIndex) {
        explanationBox.innerHTML = `
            <div style="color:green; font-weight:bold;">✅ Correct Answer!</div>
            <div>${quizData[currentQuestion].explanation}</div>
        `;
    } else {
        explanationBox.innerHTML = `
            <div style="color:red; font-weight:bold;">❌ Wrong Answer</div>
            <div><strong>Correct Answer:</strong> ${quizData[currentQuestion].options[correctIndex]}</div>
            <div>${quizData[currentQuestion].explanation}</div>
        `;
    }
}

/* ===== NAVIGATION ===== */
function nextQuestion() {
    if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        loadQuestion();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

/* ===== START ===== */
loadQuestion();

</script>

</body>
</html>
